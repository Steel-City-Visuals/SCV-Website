<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steel City Visuals — Pittsburgh's Premier Visual Media Team</title>
  <meta name="description" content="Specialists in brand storytelling, drone imagery, and high-impact real estate marketing. Serving Pittsburgh and surrounding areas." />
  <link rel="icon" type="image/png" href="assets/images/brand/favicon.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <a href="#main-content" class="skip-nav">Skip to main content</a>

  <!-- ── Navigation ── -->
  <nav class="nav" id="nav">
    <div class="container">
      <div class="nav__inner">

        <a href="#home" class="nav__logo" aria-label="Steel City Visuals">
          <img src="assets/images/brand/logo-white.png" alt="Steel City Visuals" />
        </a>

        <ul class="nav__links"></ul>

        <div class="nav__cta"></div>

        <button class="nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>

      </div>
    </div>
  </nav>

  <!-- Mobile menu — populated by render.js -->
  <div class="nav__mobile" role="navigation" aria-label="Mobile navigation"></div>

  <main id="main-content">

    <!-- ── Hero ── rendered by render.js ── -->
    <section class="hero" id="hero"></section>

    <!-- ── Trust Strip ── rendered by render.js ── -->
    <section class="trust" aria-label="Partner organizations" id="trust"></section>

    <!-- ── Services ── rendered by render.js ── -->
    <section class="section services" id="services"></section>

    <!-- ── Pricing ── rendered by render.js ── -->
    <section class="section pricing" id="pricing"></section>

    <!-- ── Stats ── rendered by render.js ── -->
    <section class="stats" id="stats"></section>

    <!-- ── About + Team ── rendered by render.js ── -->
    <section class="section about" id="about"></section>

    <!-- ── Testimonials ── rendered by render.js ── -->
    <section class="section testimonials" id="testimonials"></section>

    <!-- ── Contact ── rendered by render.js ── -->
    <section class="section contact" id="contact"></section>

  </main>

  <!-- ── Footer ── rendered by render.js ── -->
  <footer class="footer"></footer>

  <!-- Back to Top -->
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- JS: render.js must load first; animations and contact init after scv:ready -->
  <script src="js/render.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/contact.js"></script>
  <script src="js/admin-auth.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
